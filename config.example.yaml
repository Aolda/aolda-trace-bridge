osprofiler:
  connection_string: "${OSPROFILER_CONNECTION_STRING}"

helper:
  command:
    - "python3"
    - "/app/helper/osprofiler_helper.py"
  request_timeout: "10s"
  startup_timeout: "5s"

otlp:
  endpoint: "${OTLP_ENDPOINT}"
  timeout: "5s"

bridge:
  service_name: "osprofiler-bridge"
  redact_db_params: true
  redact_db_statement: false
  redact_sensitive_keys: true

watch:
  poll_interval: "30s"
  export_delay: "2m"
  state_file: "/var/lib/osprofiler-tempo-bridge/state.json"
  max_traces_per_poll: 100
  delete_after_export: true

metrics:
  listen_addr: ":9090"
  path: "/metrics"
